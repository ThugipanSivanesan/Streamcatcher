name: CI
on:
  pull_request: # PR-gated; no push trigger so merges to main don't re-run CI
  schedule: [{ cron: "0 6 * * 1" }] # weekly re-scan of main for newly-disclosed CVEs
permissions: { contents: read }
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra api # include the optional API extra so its tests run
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install gitleaks # CLI binary, not the action (no GitHub API -> works on forks)
        run: |
          V=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${V}/gitleaks_${V}_linux_x64.tar.gz" -o gl.tgz
          tar -xzf gl.tgz gitleaks && sudo install gitleaks /usr/local/bin/gitleaks
      - run: gitleaks detect --source . --redact --no-banner --exit-code 1
  osv-scan:
    name: Dependency vuln scan (osv-scanner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install osv-scanner
        run: |
          V=2.4.0
          curl -sSfL "https://github.com/google/osv-scanner/releases/download/v${V}/osv-scanner_linux_amd64" -o osv-scanner
          sudo install osv-scanner /usr/local/bin/osv-scanner
      - run: osv-scanner --lockfile=uv.lock
  docs:
    name: Docs build (mkdocs --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --group docs # docs toolchain; mkdocstrings reads the source statically
      - run: uv run mkdocs build --strict
  headless:
    name: Headless OpenCV smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      # Install the package, then swap the GUI OpenCV build for the headless one.
      # No libGL/system GUI libs are installed on this runner, so this doubles as
      # a check that serve/--snapshot don't need them.
      - name: Install with opencv-python-headless
        run: |
          uv venv
          uv pip install '.[api]'
          uv pip uninstall opencv-python
          uv pip install opencv-python-headless
      # --no-sync keeps `uv run` from re-adding opencv-python and undoing the swap.
      - name: CLI imports and runs headless
        run: uv run --no-sync streamcatcher --help
      - name: play exits with the friendly error, not a raw cv2.error
        run: |
          uv run --no-sync python - <<'PY'
          from streamcatcher.player.opencv_player import OpenCvPlayer, StreamOpenError
          try:
              OpenCvPlayer("rtsp://127.0.0.1:1/none").play()
          except StreamOpenError as exc:
              assert "opencv-python" in str(exc), exc
              print("OK: friendly headless error ->", exc)
          else:
              raise SystemExit("expected StreamOpenError on a headless build")
          PY
      - name: headless frame-encode path works (what serve/--snapshot use)
        run: |
          uv run --no-sync python - <<'PY'
          import numpy as np, cv2
          ok, buf = cv2.imencode(".jpg", np.zeros((8, 16, 3), "uint8"))
          assert ok and len(buf) > 0
          print("OK: cv2.imencode works headless")
          PY
