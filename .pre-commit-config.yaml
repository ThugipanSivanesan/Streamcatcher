repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1 # keep in sync with CI's gitleaks version
    hooks:
      - id: gitleaks
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        # --unsafe: syntax-only check that tolerates custom tags. mkdocs.yml uses
        # `!!python/name:` tags for Material's emoji extension, which the default
        # (safe-load) check can't construct. mkdocs build --strict validates it fully.
        args: [--unsafe]
      - id: check-toml
